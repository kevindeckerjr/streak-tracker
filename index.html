<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streak Tracker</title>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #020617;
            --color-bg-surface: #1e293b;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-primary: #38bdf8;
            --color-primary-hover: #0ea5e9;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --color-bg-base: #ffffff;
                --color-bg-elevated: #f8fafc;
                --color-bg-surface: #f1f5f9;
                --color-text-primary: #0f172a;
                --color-text-secondary: #475569;
                --color-text-muted: #64748b;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--color-primary);
        }

        .add-form {
            background: var(--color-bg-surface);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-bg-base);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--color-text-primary);
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }

        button {
            background: var(--color-primary);
            color: var(--color-bg-base);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--color-primary-hover);
        }

        .btn-danger {
            background: var(--color-danger);
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: var(--color-success);
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .streaks-list {
            display: grid;
            gap: 1rem;
        }

        .streak-card {
            background: var(--color-bg-surface);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
        }

        .streak-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .streak-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .streak-url {
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .streak-url:hover {
            text-decoration: underline;
        }

        .streak-info {
            display: grid;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .info-label {
            color: var(--color-text-muted);
        }

        .info-value {
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            text-align: center;
            margin: 1rem 0;
        }

        .timer-expired {
            color: var(--color-danger);
        }

        .timer-warning {
            color: var(--color-warning);
        }

        .action-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.15);
            color: var(--color-success);
        }

        .status-due-soon {
            background: rgba(245, 158, 11, 0.15);
            color: var(--color-warning);
        }

        .status-overdue {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-danger);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-text-muted);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--color-bg-surface);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-top: 0.25rem;
        }

        @media (max-width: 640px) {
            .form-row {
                flex-direction: column;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Streak Tracker</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalStreaks">0</div>
                <div class="stat-label">Total Streaks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeStreaks">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="overdueStreaks">0</div>
                <div class="stat-label">Due Soon</div>
            </div>
        </div>

        <div class="add-form">
            <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Add New Streak</h2>
            <form id="addStreakForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="appName">App/Game Name *</label>
                        <input type="text" id="appName" required placeholder="e.g., Wordle, Duolingo">
                    </div>
                    <div class="form-group">
                        <label for="appUrl">Website/App URL</label>
                        <input type="url" id="appUrl" placeholder="https://example.com">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="rewardType">Reward Frequency *</label>
                        <select id="rewardType" required>
                            <option value="4">Every 4 hours</option>
                            <option value="6">Every 6 hours</option>
                            <option value="8">Every 8 hours</option>
                            <option value="12">Every 12 hours</option>
                            <option value="24">Every 24 hours (Daily)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate">
                    </div>
                </div>
                <div class="form-group">
                    <label for="notes">Notes (optional)</label>
                    <textarea id="notes" placeholder="Reward details, streak goals, etc."></textarea>
                </div>
                <button type="submit">Add Streak</button>
            </form>
        </div>

        <div id="streaksList" class="streaks-list"></div>
    </div>

    <script>
        let streaks = [];
        let timerInterval = null;

        function loadStreaks() {
            const saved = window.streaksData || '[]';
            try {
                streaks = typeof saved === 'string' ? JSON.parse(saved) : saved;
            } catch (e) {
                streaks = [];
            }
            renderStreaks();
            startTimer();
        }

        function saveStreaks() {
            window.streaksData = streaks;
        }

        function renderStreaks() {
            const container = document.getElementById('streaksList');
            
            if (streaks.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No streaks yet!</h3><p>Add your first app or game above to start tracking.</p></div>';
                updateStats();
                return;
            }

            const now = new Date();
            streaks.sort((a, b) => {
                const aTime = a.lastChecked ? new Date(a.lastChecked).getTime() + (a.intervalHours * 60 * 60 * 1000) : 0;
                const bTime = b.lastChecked ? new Date(b.lastChecked).getTime() + (b.intervalHours * 60 * 60 * 1000) : 0;
                return aTime - bTime;
            });

            container.innerHTML = streaks.map((streak, index) => {
                const lastChecked = streak.lastChecked ? new Date(streak.lastChecked) : null;
                const nextDue = lastChecked ? new Date(lastChecked.getTime() + streak.intervalHours * 60 * 60 * 1000) : null;
                const timeUntil = nextDue ? nextDue - now : null;
                
                let status = 'active';
                let statusText = 'Active';
                let timerHTML = '';
                
                if (lastChecked && nextDue) {
                    const hoursUntil = timeUntil / (1000 * 60 * 60);
                    
                    if (timeUntil <= 0) {
                        status = 'overdue';
                        statusText = 'Ready to Claim!';
                        timerHTML = '<div class="timer-display timer-expired">⏰ Reward Available!</div>';
                    } else if (hoursUntil <= 1) {
                        status = 'due-soon';
                        statusText = 'Due Soon';
                        timerHTML = `<div class="timer-display timer-warning" data-index="${index}">Calculating...</div>`;
                    } else {
                        timerHTML = `<div class="timer-display" data-index="${index}">Calculating...</div>`;
                    }
                }

                const startDate = streak.startDate ? new Date(streak.startDate).toLocaleDateString() : 'N/A';
                const lastCheckedStr = lastChecked ? lastChecked.toLocaleString() : 'Never';
                const totalChecks = streak.checkCount || 0;

                return `
                    <div class="streak-card">
                        <div class="streak-header">
                            <div>
                                <div class="streak-title">${streak.name}</div>
                                ${streak.url ? `<a href="${streak.url}" target="_blank" class="streak-url" rel="noopener noreferrer">${streak.url}</a>` : ''}
                            </div>
                            <span class="status-badge status-${status}">${statusText}</span>
                        </div>
                        
                        ${timerHTML}
                        
                        <div class="streak-info">
                            <div class="info-row">
                                <span class="info-label">Frequency:</span>
                                <span class="info-value">Every ${streak.intervalHours} hours</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Started:</span>
                                <span class="info-value">${startDate}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Last Checked:</span>
                                <span class="info-value">${lastCheckedStr}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Total Checks:</span>
                                <span class="info-value">${totalChecks}</span>
                            </div>
                            ${streak.notes ? `<div class="info-row"><span class="info-label">Notes:</span><span class="info-value">${streak.notes}</span></div>` : ''}
                        </div>
                        
                        <div class="action-buttons">
                            <button class="btn-success btn-small" onclick="checkIn(${index})">✓ Check In Now</button>
                            ${streak.url ? `<button class="btn-small" onclick="window.open('${streak.url}', '_blank')">🔗 Open App</button>` : ''}
                            <button class="btn-danger btn-small" onclick="deleteStreak(${index})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');

            updateStats();
        }

        function updateTimers() {
            const now = new Date();
            
            streaks.forEach((streak, index) => {
                const element = document.querySelector(`[data-index="${index}"]`);
                if (!element || !streak.lastChecked) return;

                const lastChecked = new Date(streak.lastChecked);
                const nextDue = new Date(lastChecked.getTime() + streak.intervalHours * 60 * 60 * 1000);
                const timeUntil = nextDue - now;

                if (timeUntil <= 0) {
                    element.textContent = '⏰ Reward Available!';
                    element.className = 'timer-display timer-expired';
                } else {
                    const hours = Math.floor(timeUntil / (1000 * 60 * 60));
                    const minutes = Math.floor((timeUntil % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((timeUntil % (1000 * 60)) / 1000);
                    
                    element.textContent = `${hours}h ${minutes}m ${seconds}s`;
                    
                    if (timeUntil <= 60 * 60 * 1000) {
                        element.className = 'timer-display timer-warning';
                    } else {
                        element.className = 'timer-display';
                    }
                }
            });
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            updateTimers();
            timerInterval = setInterval(updateTimers, 1000);
        }

        function updateStats() {
            const now = new Date();
            let active = 0;
            let dueSoon = 0;

            streaks.forEach(streak => {
                if (!streak.lastChecked) return;
                
                const lastChecked = new Date(streak.lastChecked);
                const nextDue = new Date(lastChecked.getTime() + streak.intervalHours * 60 * 60 * 1000);
                const timeUntil = nextDue - now;

                if (timeUntil <= 0) {
                    dueSoon++;
                } else {
                    active++;
                }
            });

            document.getElementById('totalStreaks').textContent = streaks.length;
            document.getElementById('activeStreaks').textContent = active;
            document.getElementById('overdueStreaks').textContent = dueSoon;
        }

        function checkIn(index) {
            streaks[index].lastChecked = new Date().toISOString();
            streaks[index].checkCount = (streaks[index].checkCount || 0) + 1;
            saveStreaks();
            renderStreaks();
            
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('Check-in Recorded!', {
                    body: `${streaks[index].name} - Next reward in ${streaks[index].intervalHours} hours`,
                    icon: '🔥'
                });
            }
        }

        function deleteStreak(index) {
            if (confirm(`Delete streak for ${streaks[index].name}?`)) {
                streaks.splice(index, 1);
                saveStreaks();
                renderStreaks();
            }
        }

        document.getElementById('addStreakForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('appName').value;
            const url = document.getElementById('appUrl').value;
            const intervalHours = parseInt(document.getElementById('rewardType').value);
            const startDate = document.getElementById('startDate').value || new Date().toISOString().split('T')[0];
            const notes = document.getElementById('notes').value;

            streaks.push({
                name,
                url,
                intervalHours,
                startDate,
                notes,
                lastChecked: null,
                checkCount: 0
            });

            saveStreaks();
            renderStreaks();
            
            e.target.reset();
            document.getElementById('startDate').value = '';
        });

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
        
        loadStreaks();
    </script>
</body>
</html>
