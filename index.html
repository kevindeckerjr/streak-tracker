<script>
let streaks = [];
let timerInterval = null;

function loadStreaks() {
    const saved = window.streaksData || '[]';
    try {
        streaks = typeof saved === 'string' ? JSON.parse(saved) : saved;
    } catch (e) {
        streaks = [];
    }
    renderStreaks();
    startTimer();
}

function saveStreaks() {
    window.streaksData = streaks;
}

function getNextDueTime(streak) {
    if (!streak.lastChecked) return null;
    const lastChecked = new Date(streak.lastChecked);
    if (streak.resetType === 'daily') {
        const [hours, minutes] = streak.resetTime.split(':');
        const nextReset = new Date();
        nextReset.setHours(parseInt(hours), parseInt(minutes), 0, 0);
        if (nextReset <= new Date()) nextReset.setDate(nextReset.getDate() + 1);
        return nextReset;
    }
    return new Date(lastChecked.getTime() + streak.intervalHours * 60 * 60 * 1000);
}

function fillStartDateFromStreakDays() {
    const streakDaysInput = document.getElementById('streakDays');
    const startDateInput = document.getElementById('startDate');
    const streakDays = parseInt(streakDaysInput.value);
    if (!isNaN(streakDays) && streakDays >= 0 && !startDateInput.value) {
        const today = new Date();
        const start = new Date(today);
        start.setDate(today.getDate() - streakDays);
        const y = start.getFullYear();
        const m = String(start.getMonth() + 1).padStart(2, '0');
        const d = String(start.getDate()).padStart(2, '0');
        startDateInput.value = `${y}-${m}-${d}`;
    }
}

function renderStreaks() {
    const container = document.getElementById('streaksList');
    if (streaks.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>No streaks yet!</h3><p>Add your first app or game above to start tracking.</p></div>';
        updateStats();
        return;
    }
    const now = new Date();
    streaks.sort((a, b) => {
        const aTime = a.lastChecked ? getNextDueTime(a).getTime() : 0;
        const bTime = b.lastChecked ? getNextDueTime(b).getTime() : 0;
        return aTime - bTime;
    });
    container.innerHTML = streaks.map((streak, index) => {
        const lastChecked = streak.lastChecked ? new Date(streak.lastChecked) : null;
        const nextDue = lastChecked ? getNextDueTime(streak) : null;
        const timeUntil = nextDue ? nextDue - now : null;
        let status = 'active';
        let statusText = 'Active';
        let timerHTML = '';
        if (lastChecked && nextDue) {
            const hoursUntil = timeUntil / (1000 * 60 * 60);
            if (timeUntil <= 0) {
                status = 'overdue';
                statusText = 'Ready to Claim!';
                timerHTML = '<div class="timer-display timer-expired">⏰ Reward Available!</div>';
            } else if (hoursUntil <= 1) {
                status = 'due-soon';
                statusText = 'Due Soon';
                timerHTML = `<div class="timer-display timer-warning" data-index="${index}">Calculating...</div>`;
            } else {
                timerHTML = `<div class="timer-display" data-index="${index}">Calculating...</div>`;
            }
        }
        const startDate = streak.startDate ? new Date(streak.startDate).toLocaleDateString() : 'N/A';
        const lastCheckedStr = lastChecked ? lastChecked.toLocaleString() : 'Never';
        const totalChecks = streak.checkCount || 0;
        const daysSinceStart = streak.startDate ? Math.floor((now - new Date(streak.startDate)) / (1000 * 60 * 60 * 24)) : 0;
        const streakDays = daysSinceStart > 0 ? daysSinceStart : 0;
        let progressPercent = 0;
        if (lastChecked && nextDue) {
            if (streak.resetType === 'daily') {
                const millisInDay = 24 * 60 * 60 * 1000;
                const timeSinceLastReset = now - lastChecked;
                progressPercent = Math.min(100, (timeSinceLastReset / millisInDay) * 100);
            } else {
                const totalInterval = streak.intervalHours * 60 * 60 * 1000;
                const elapsed = now - lastChecked;
                progressPercent = Math.min(100, (elapsed / totalInterval) * 100);
            }
        }
        const frequencyText = streak.resetType === 'daily' ? `Daily at ${streak.resetTime}` : `Every ${streak.intervalHours} hours`;
        return `
            <div class="streak-card">
                <div class="streak-header">
                    <div>
                        <div style="display:flex;align-items:center;margin-bottom:0.5rem;">
                            ${streakDays > 0 ? `<span class="streak-number">${streakDays}</span>` : ''}
                            <div class="streak-title">${streak.name}</div>
                        </div>
                        ${streak.url ? `<a href="${streak.url}" target="_blank" class="streak-url" rel="noopener noreferrer">${streak.url}</a>` : '<span style="color: var(--color-text-muted); font-size: 0.85rem;">📱 Mobile app (no URL)</span>'}
                    </div>
                    <span class="status-badge status-${status}">${statusText}</span>
                </div>
                ${timerHTML}
                ${lastChecked && nextDue ? `
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
                ` : ''}
                <div class="streak-info">
                    ${streakDays > 0 ? `
                    <div class="info-row">
                        <span class="info-label">🔥 Streak Days:</span>
                        <span class="info-value" style="color: var(--color-warning); font-weight: 700;">${streakDays} days</span>
                    </div>
                    ` : ''}
                    <div class="info-row">
                        <span class="info-label">Frequency:</span>
                        <span class="info-value">${frequencyText}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Started:</span>
                        <span class="info-value">${startDate}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Last Checked:</span>
                        <span class="info-value">${lastCheckedStr}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Total Checks:</span>
                        <span class="info-value">${totalChecks}</span>
                    </div>
                    ${streak.notes ? `<div class="info-row"><span class="info-label">Notes:</span><span class="info-value">${streak.notes}</span></div>` : ''}
                </div>
                <div class="action-buttons">
                    <button class="btn-success btn-small" onclick="checkIn(${index})">✓ Check In Now</button>
                    ${streak.url ? `<button class="btn-small" onclick="openApp('${streak.url.replace(/'/g, "\\'")}')">🔗 Open App</button>` : ''}
                    <button class="btn-small" onclick="editStreak(${index})" style="background: var(--color-warning);">✏️ Edit</button>
                    <button class="btn-danger btn-small" onclick="deleteStreak(${index})">Delete</button>
                </div>
            </div>
        `;
    }).join('');
    updateStats();
}

function updateTimers() {
    const now = new Date();
    streaks.forEach((streak, index) => {
        const element = document.querySelector(`[data-index="${index}"]`);
        if (!element || !streak.lastChecked) return;
        const nextDue = getNextDueTime(streak);
        const timeUntil = nextDue - now;
        if (timeUntil <= 0) {
            element.textContent = '⏰ Reward Available!';
            element.className = 'timer-display timer-expired';
        } else {
            const hours = Math.floor(timeUntil / (1000 * 60 * 60));
            const minutes = Math.floor((timeUntil % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeUntil % (1000 * 60)) / 1000);
            element.textContent = `${hours}h ${minutes}m ${seconds}s`;
            element.className = timeUntil <= 60 * 60 * 1000 ? 'timer-display timer-warning' : 'timer-display';
        }
    });
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    updateTimers();
    timerInterval = setInterval(updateTimers, 1000);
}

function toggleResetTimeField() {
    const rewardType = document.getElementById('rewardType').value;
    const resetTimeGroup = document.getElementById('resetTimeGroup');
    resetTimeGroup.style.display = rewardType === 'daily-reset' ? 'block' : 'none';
}

function updateStats() {
    const now = new Date();
    let active = 0;
    let dueSoon = 0;
    streaks.forEach(streak => {
        if (!streak.lastChecked) return;
        const nextDue = getNextDueTime(streak);
        const timeUntil = nextDue - now;
        if (timeUntil <= 0) dueSoon++;
        else active++;
    });
    document.getElementById('totalStreaks').textContent = streaks.length;
    document.getElementById('activeStreaks').textContent = active;
    document.getElementById('overdueStreaks').textContent = dueSoon;
    updateTimers();
}

function checkIn(index) {
    streaks[index].lastChecked = new Date().toISOString();
    streaks[index].checkCount = (streaks[index].checkCount || 0) + 1;
    saveStreaks();
    renderStreaks();
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Check-in Recorded!', {
            body: `${streaks[index].name} - Next reward in ${streaks[index].intervalHours || 'daily reset'} hours`,
            icon: '🔥'
        });
    }
}

function openApp(url) {
    window.open(url, '_blank', 'noopener,noreferrer');
}

function editStreak(index) {
    const streak = streaks[index];
    document.getElementById('appName').value = streak.name;
    document.getElementById('appUrl').value = streak.url || '';
    document.getElementById('notes').value = streak.notes || '';
    document.getElementById('startDate').value = streak.startDate || '';
    if (streak.resetType === 'daily') {
        document.getElementById('rewardType').value = 'daily-reset';
        document.getElementById('resetTime').value = streak.resetTime || '00:00';
        toggleResetTimeField();
    } else {
        document.getElementById('rewardType').value = `interval-${streak.intervalHours}`;
        toggleResetTimeField();
    }
    document.getElementById('streakDays').value = '';
    streaks.splice(index, 1);
    saveStreaks();
    renderStreaks();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteStreak(index) {
    if (confirm(`Delete streak for ${streaks[index].name}?`)) {
        streaks.splice(index, 1);
        saveStreaks();
        renderStreaks();
    }
}

document.getElementById('addStreakForm').addEventListener('submit', (e) => {
    e.preventDefault();
    fillStartDateFromStreakDays();
    const name = document.getElementById('appName').value.trim();
    const urlRaw = document.getElementById('appUrl').value.trim();
    const rewardType = document.getElementById('rewardType').value;
    const startDate = document.getElementById('startDate').value || new Date().toISOString().split('T')[0];
    const notes = document.getElementById('notes').value.trim();
    const streakDaysVal = parseInt(document.getElementById('streakDays').value);
    let url = urlRaw;
    if (url && !/^https?:\/\//i.test(url)) url = 'https://' + url;
    let streakData = {
        name,
        url,
        startDate,
        notes,
        lastChecked: null,
        checkCount: 0
    };
    if (rewardType === 'daily-reset') {
        streakData.resetType = 'daily';
        streakData.resetTime = document.getElementById('resetTime').value || '00:00';
    } else {
        streakData.resetType = 'interval';
        streakData.intervalHours = parseInt(rewardType.split('-')[1]);
    }
    if (!isNaN(streakDaysVal)) streakData.streakDaysInput = streakDaysVal;
    streaks.push(streakData);
    saveStreaks();
    renderStreaks();
    e.target.reset();
